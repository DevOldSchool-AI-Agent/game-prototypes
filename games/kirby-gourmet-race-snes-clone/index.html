<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kirby Gourmet Race SNES Clone</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 20%, #52395f 0%, #1d1730 62%);
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      #game-root {
        width: min(100vw, calc(100vh * 1.3));
        height: min(100vh, calc(100vw / 1.3));
        display: grid;
        place-items: center;
      }

      canvas {
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
