<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Super Punch-Out!! Inspired Prototype</title>
    <style>
      :root {
        color-scheme: only light;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at top, #25364f 0%, #0d1422 55%, #05080e 100%);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      #game-shell {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #game-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      canvas {
        border: 2px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      }
    </style>
  </head>
  <body>
    <div id="game-shell">
      <div id="game-container"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
